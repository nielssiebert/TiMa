services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ${STACK_NAME}-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ${MOSQUITTO_CONFIG_DIR}:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    mem_limit: 128m

  backend:
    build:
      context: ${REPO_DIR}/TiMa
      dockerfile: Dockerfile
    container_name: ${STACK_NAME}-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/tima.sqlite
      DB_PATH: /data/tima.sqlite
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-Europe/Berlin}
      API_URL_PREFIX: ${API_URL_PREFIX}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      BASIC_AUTH_ENABLED: "true"
      FLASK_ENV: production
    depends_on:
      - mosquitto
    ports:
      - "5500:5500"
    volumes:
      - tima_sqlite:/data
    mem_limit: 512m

  nginx:
    image: nginx:1.27-alpine
    container_name: ${STACK_NAME}-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${FRONTEND_DIST_DIR}:/usr/share/nginx/html:ro
      - ${NGINX_CONF_FILE}:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt_data:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    mem_limit: 256m

volumes:
  mosquitto_data:
  mosquitto_log:
  tima_sqlite:
  letsencrypt_data:
  certbot_www:
